<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor-dot"></div>
  <div class="cursor-outline"></div>

  <!-- Hero Section -->
  <section class="hero">
    <canvas id="canvas"></canvas>
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="line">Creative</span>
        <span class="line">Developer</span>
      </h1>
      <p class="hero-sub">Motion & Experience Design</p>
    </div>
    <div class="scroll-hint">Scroll Down ↓</div>
  </section>

  <!-- About Section -->
  <section class="about">
    <div class="about-inner">
      <h2 class="reveal-text">About Me</h2>
      <p class="reveal-text">
        Main ek creative developer hun jo interactive experiences banata hai.
        Har project mein animation aur motion ko first priority deta hun.
      </p>
    </div>
  </section>

  <!-- Work Section -->
  <section class="work">
    <h2 class="reveal-text">Selected Work</h2>
    <div class="work-grid">
      <div class="work-item reveal-text">Project 01</div>
      <div class="work-item reveal-text">Project 02</div>
      <div class="work-item reveal-text">Project 03</div>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="contact">
    <h2 class="reveal-text">Let's Talk</h2>
    <a href="mailto:hello@example.com" class="contact-link reveal-text">hello@example.com</a>
  </section>

  <!-- Scripts: CDN se load ho rahe hain, koi install nahi -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
