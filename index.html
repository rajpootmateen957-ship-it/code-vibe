<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Journey | Premium 3D Experience</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <!-- Three.js Canvas Container -->
  <canvas id="webgl"></canvas>

  <!-- Content that overlays the 3D scene -->
  <div class="content">
    <section class="section">
      <div class="hero">
        <h1 class="title">The Journey</h1>
        <p class="subtitle">Scroll to explore</p>
      </div>
    </section>

    <section class="section">
      <div class="story-block left">
        <h2>Discovery</h2>
        <p>In the vast emptiness, we found a spark. A single node of possibility.</p>
      </div>
    </section>

    <section class="section">
      <div class="story-block right">
        <h2>Connection</h2>
        <p>Slowly, elements began to merge. Creating networks of infinite potential.</p>
      </div>
    </section>

    <section class="section">
      <div class="story-block center">
        <h2>Evolution</h2>
        <p>And so, the system awakened. Ready to build the future.</p>
      </div>
    </section>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
